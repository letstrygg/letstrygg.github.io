<div id="admin-panel" style="display: none; background: var(--bg-secondary, #1e1e24); padding: 15px; border-radius: 8px; border: 1px solid var(--border, #333); margin-top: 20px;">
  <h3 class="yellow" style="margin-top: 0; display: flex; align-items: center; gap: 8px;">
    <span class="material-symbols-outlined">settings</span> Admin Controls
  </h3>

  {% if page.layout == 'video' or page.youtube_id %}
  <div class="admin-module" id="tag-editor-module" data-table="ltg_videos" data-id="{{ page.youtube_id }}" data-game="{{ page.game_slug }}">
    
    <div style="margin-bottom: 15px;">
      <strong style="color: var(--text-muted, #aaa); font-size: 0.9em;">Applied Tags:</strong>
      <div id="applied-tags-container" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; margin-bottom: 15px;">
        <span style="color: gray; font-style: italic;">Loading...</span>
      </div>

      <strong style="color: var(--text-muted, #aaa); font-size: 0.9em;">Quick Add:</strong>
      <div id="quick-tags-container" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; margin-bottom: 15px;">
        <span style="color: gray; font-style: italic; font-size: 0.9em;">Loading game tags...</span>
      </div>
      
      <div style="display: flex; gap: 6px; align-items: center; margin-top: 10px; flex-wrap: wrap;">
        <span style="color: var(--blue, #4a90e2); font-family: monospace; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px;">
          {{ page.game_slug }}
        </span>
        <span style="color: gray; font-family: monospace;">:</span>
        
        <input list="tag-categories" id="new-tag-category" placeholder="category" style="width: 120px; padding: 8px; background: rgba(0,0,0,0.2); border: 1px solid var(--border, #333); color: white; border-radius: 4px; font-family: monospace;">
        <datalist id="tag-categories"></datalist>
        
        <span style="color: gray; font-family: monospace;">:</span>
        
        <input type="text" id="new-tag-item" placeholder="item (e.g. silent)" style="flex-grow: 1; min-width: 150px; padding: 8px; background: rgba(0,0,0,0.2); border: 1px solid var(--border, #333); color: white; border-radius: 4px; font-family: monospace;">
        
        <button id="add-tag-btn" class="btn btn-blue">Add</button>
      </div>
    </div>

  </div>
  {% endif %}

  {% if page.layout == 'season' %}
  <div class="admin-module" data-table="ltg_seasons" data-id="{{ page.season_id }}">
    <div style="display: flex; gap: 10px; align-items: center;">
      <strong style="color: var(--text-muted, #aaa);">Status:</strong>
      <select id="season-status-select" style="padding: 8px; background: rgba(0,0,0,0.2); border: 1px solid var(--border, #333); color: white; border-radius: 4px;">
        <option value="Active">Active</option>
        <option value="Complete">Complete</option>
        <option value="Hiatus">Hiatus</option>
      </select>
      <button class="btn btn-blue" onclick="updateField('season-status-select', 'status')">Save Status</button>
    </div>
  </div>
  {% endif %}

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const panel = document.getElementById('admin-panel');
  if (!panel) return;

  // --- SINGLETON INITIALIZATION ---
  if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) return;
  if (!window.supabaseClient) {
      window.supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  }
  const supabaseClient = window.supabaseClient;

  // 1. Authenticate & Verify Admin Role
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) return; 

  const { data: profile } = await supabaseClient.from('ltg_profiles').select('role').eq('user_id', session.user.id).single();
  if (!profile || profile.role !== 'admin') return;

  // Reveal the panel
  panel.style.display = 'block';

  // 2. Universal Field Updater
  window.updateField = async function(inputId, dbColumnName) {
    const inputEl = document.getElementById(inputId);
    const module = inputEl.closest('.admin-module');
    const table = module.getAttribute('data-table');
    const recordId = module.getAttribute('data-id');
    const newValue = inputEl.value;

    const { error } = await supabaseClient.from(table).update({ [dbColumnName]: newValue }).eq('id', recordId);

    if (error) {
        alert(`Failed to update ${dbColumnName}!`);
    } else {
        const btn = event.target;
        const oldText = btn.innerText;
        btn.innerText = "Saved!";
        btn.style.backgroundColor = "var(--green, #2ecc71)";
        setTimeout(() => { btn.innerText = oldText; btn.style.backgroundColor = ""; }, 2000);
    }
  };

  // 3. Smart Tag Editor Logic
  const tagModule = document.getElementById('tag-editor-module');
  if (tagModule) {
    const recordId = tagModule.getAttribute('data-id');
    const gameSlug = tagModule.getAttribute('data-game');
    
    const categoryInput = document.getElementById('new-tag-category');
    const itemInput = document.getElementById('new-tag-item');
    const addBtn = document.getElementById('add-tag-btn');
    const datalist = document.getElementById('tag-categories');
    
    const appliedContainer = document.getElementById('applied-tags-container');
    const quickContainer = document.getElementById('quick-tags-container');
    
    let currentTags = [];
    let knownGameTags = new Set();
    let knownCategories = new Set();

    async function initTags() {
      // Fetch tags for THIS video
      const { data: vidData } = await supabaseClient.from('ltg_videos').select('tags').eq('id', recordId).single();
      if (vidData) currentTags = vidData.tags || [];

      // Fetch the last 500 tagged videos to build the 'Game Scope' library
      const { data: allVidData } = await supabaseClient.from('ltg_videos').select('tags').not('tags', 'eq', '{}').limit(500);
      if (allVidData) {
          allVidData.forEach(row => {
              (row.tags || []).forEach(t => {
                  if (t.startsWith(gameSlug + ':')) {
                      knownGameTags.add(t);
                      knownCategories.add(t.split(':')[1]);
                  }
              });
          });
      }
      
      // Ensure current tags are always in the known set
      currentTags.forEach(t => {
          if (t.startsWith(gameSlug + ':')) {
              knownGameTags.add(t);
              knownCategories.add(t.split(':')[1]);
          }
      });

      renderDatalist();
      renderTags();
    }

    function renderDatalist() {
      datalist.innerHTML = '';
      knownCategories.forEach(cat => {
          const opt = document.createElement('option');
          opt.value = cat;
          datalist.appendChild(opt);
      });
    }

    function renderTags() {
      appliedContainer.innerHTML = '';
      quickContainer.innerHTML = '';

      // Render Applied Tags (Solid borders, click to remove)
      if (currentTags.length === 0) {
        appliedContainer.innerHTML = `<span style="color: gray; font-style: italic; font-size: 0.9em;">No tags applied.</span>`;
      } else {
        currentTags.forEach(tag => {
          const el = document.createElement('button');
          el.className = 'btn btn-gray';
          el.style.padding = '4px 10px';
          el.style.fontSize = '0.9em';
          el.style.display = 'flex';
          el.style.alignItems = 'center';
          el.style.gap = '5px';
          el.style.border = '1px solid var(--green, #2ecc71)';
          
          const parts = tag.split(':');
          el.innerHTML = `<span style="opacity: 0.5">${parts[0]}:${parts[1]}:</span><strong>${parts[2] || ''}</strong> <span class="material-symbols-outlined" style="font-size: 14px; color: #ff4757;">close</span>`;
          el.onclick = () => removeTag(tag);
          appliedContainer.appendChild(el);
        });
      }

      // Render Suggested Tags (Dashed borders, click to add)
      let unappliedCount = 0;
      knownGameTags.forEach(tag => {
        if (!currentTags.includes(tag)) {
          unappliedCount++;
          const el = document.createElement('button');
          el.className = 'btn';
          el.style.padding = '2px 8px';
          el.style.fontSize = '0.85em';
          el.style.background = 'transparent';
          el.style.border = '1px dashed var(--text-muted, #aaa)';
          el.style.color = 'var(--text-muted, #aaa)';
          el.style.display = 'flex';
          el.style.alignItems = 'center';
          el.style.gap = '4px';

          const parts = tag.split(':');
          el.innerHTML = `<span style="opacity: 0.6">${parts[1]}:</span> <strong>${parts[2] || ''}</strong> <span class="material-symbols-outlined" style="font-size: 14px; color: var(--blue);">add</span>`;
          el.onclick = () => addSpecificTag(tag);
          quickContainer.appendChild(el);
        }
      });

      if (unappliedCount === 0) {
        quickContainer.innerHTML = `<span style="color: gray; font-style: italic; font-size: 0.9em;">No unused tags found for this game.</span>`;
      }
    }

    async function addSpecificTag(fullTag) {
      if (currentTags.includes(fullTag)) return;
      await saveTags([...currentTags, fullTag]);
    }

    async function removeTag(tagToRemove) {
      await saveTags(currentTags.filter(t => t !== tagToRemove));
    }

    async function addNewTag() {
      const cat = categoryInput.value.trim().toLowerCase().replace(/\s+/g, '-');
      const item = itemInput.value.trim().toLowerCase().replace(/\s+/g, '-');
      if (!cat || !item) return;

      const fullTag = `${gameSlug}:${cat}:${item}`;
      if (currentTags.includes(fullTag)) {
          itemInput.value = ''; 
          return;
      }

      knownGameTags.add(fullTag);
      knownCategories.add(cat);
      renderDatalist();

      itemInput.value = ''; 
      // Note: We intentionally DO NOT clear the category input so you can easily tag multiple things in a row
      await saveTags([...currentTags, fullTag]);
    }

    async function saveTags(newTags) {
      currentTags = newTags;
      renderTags(); // Optimistic UI update

      const { error } = await supabaseClient.from('ltg_videos').update({ tags: currentTags }).eq('id', recordId);
      if (error) {
          alert("Failed to update tags!");
          initTags(); // Revert on fail
      }
    }

    addBtn.onclick = addNewTag;
    itemInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addNewTag(); });
    categoryInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') itemInput.focus(); });

    initTags();
  }
});
</script>
