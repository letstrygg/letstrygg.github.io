<script>
document.addEventListener("DOMContentLoaded", () => {
    const toggleBtn = document.getElementById('themeToggleBtn');
    const toggleIcon = document.getElementById('theme-toggle-icon');
    const body = document.body;
    const savedTheme = localStorage.getItem('theme');

    const applyTheme = (isLight) => {
        body.classList.toggle('light-theme', isLight);
        
        if (isLight) {
            toggleIcon.textContent = 'light_mode';
            toggleIcon.classList.add('orange');
            toggleIcon.classList.remove('purple');
        } else {
            toggleIcon.textContent = 'bedtime';
            toggleIcon.classList.add('purple');
            toggleIcon.classList.remove('orange');
        }
        
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    };

    // Initialize theme on load
    applyTheme(savedTheme === 'light');

    // Handle clicks
    toggleBtn.addEventListener('click', () => {
        const isNowLight = !body.classList.contains('light-theme');
        applyTheme(isNowLight);
    });
});
</script>
