<link rel="stylesheet" href="/css/chat.css">

<button id="openChatBtn" class="floating-btn fixed-top-right tooltip-bottom tooltip-right-edge" data-tooltip="Expand Chat" style="top: 70px; display: none;">
  <span class="material-symbols-outlined" style="transform: scaleX(-1);">chat_bubble</span>
</button>

<div id="chatSidebar" style="position: fixed; top: 0; right: -350px; width: 340px; height: 100vh; background: var(--bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: right 0.3s ease; z-index: 1000;">
  
  <div style="min-height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; background: var(--bg);">
    <button id="closeChatBtn" class="floating-btn tooltip-bottom tooltip-left-edge" data-tooltip="Collapse Chat">
      <span class="material-symbols-outlined">keyboard_tab</span>
    </button>
    <span style="font-weight: 600; font-size: 13px; color: var(--text); text-transform: uppercase;">Live Chat</span>
    <div style="width: 36px;"></div>
  </div>

  <div style="padding: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg2);">
    <div style="display: flex; gap: 8px;">
        <span id="timeToggle" class="icon-btn tooltip-left-edge" data-tooltip="Timestamps">
            <span class="material-symbols-outlined" style="font-size: 18px;">schedule</span>
        </span>
        <span id="deletedToggle" class="icon-btn" data-tooltip="Deleted Messages" style="display: none;">
            <span class="material-symbols-outlined" style="font-size: 18px;">delete</span>
        </span>
    </div>
    <div style="display: flex; gap: 8px;">
        <span id="globalChatToggle" class="icon-btn active-green tooltip-right-edge" data-tooltip="Global Chat">
            <span class="material-symbols-outlined" style="font-size: 18px;">public</span>
        </span>
        <span id="channelChatToggle" class="icon-btn disabled tooltip-right-edge" data-tooltip="" style="display: none;">
            <span class="material-symbols-outlined" style="font-size: 18px;">sports_esports</span>
        </span>
    </div>
  </div>

  <div id="chatBox" style="flex-grow: 1; overflow-y: auto; padding: 10px; color: var(--text); background: var(--bg); overflow-x: hidden;">
      <em>Loading messages...</em>
  </div>

  <div style="border-top: 1px solid var(--border); background: var(--bg2); padding: 15px 10px;">
      <div id="loginSection" style="display: none;">
          <p style="margin-top: 0; margin-bottom: 10px; color: var(--gray); font-size: 13px;">Log in to chat:</p>
          <div style="display: flex; gap: 8px; flex-wrap: wrap;">
              <button onclick="login('twitch')" class="btn" style="flex: 1; background: #9146FF; color: white; border: none; padding: 8px; border-radius: 4px; font-size: 12px; cursor: pointer;">Twitch</button>
              <button onclick="login('discord')" class="btn" style="flex: 1; background: #5865F2; color: white; border: none; padding: 8px; border-radius: 4px; font-size: 12px; cursor: pointer;">Discord</button>
          </div>
          <button onclick="login('google')" class="btn" style="width: 100%; margin-top: 8px; background: #DB4437; color: white; border: none; padding: 8px; border-radius: 4px; font-size: 12px; cursor: pointer;">Google</button>
      </div>

      <div id="inputSection" style="display: none;">
          
          {% include user_settings.html %}

          <div style="display: flex; gap: 8px; align-items: center;">
              <button id="grabTimeBtn" class="floating-btn tooltip-left-edge" data-tooltip="Insert Video Time" style="padding: 10px; background: var(--bg); color: var(--gray); border: 1px solid var(--border);">
                  <span class="material-symbols-outlined" style="font-size: 18px;">schedule</span>
              </button>
              <input type="text" id="chatInput" placeholder="Send a message" style="padding: 10px; flex-grow: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; outline: none; transition: border 0.2s;">
              <button id="sendBtn" class="btn btn-gray" style="padding: 10px 15px; background: #e67e22; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Chat</button>
          </div>
          <p id="statusMessage" style="color: #2ecc71; height: 16px; margin: 5px 0 0 0; font-size: 12px; text-align: center;"></p>
      </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    window.SUPABASE_URL = '{{ site.supabase_url }}';
    window.SUPABASE_ANON_KEY = '{{ site.supabase_anon_key }}';
</script>
<script src="/js/chat.js"></script>
