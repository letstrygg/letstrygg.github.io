<button id="openChatBtn" style="position: fixed; top: 10px; right: 10px; z-index: 999; background: transparent; color: #efeff1; border: none; cursor: pointer; padding: 6px; border-radius: 4px; display: none; align-items: center; justify-content: center;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" title="Expand Chat">
  <span class="material-symbols-outlined" style="transform: scaleX(-1);">keyboard_tab</span>
</button>

<div id="chatSidebar" style="position: fixed; top: 0; right: -350px; width: 340px; height: 100vh; background: #0e0e10; border-left: 1px solid #26262c; display: flex; flex-direction: column; transition: right 0.3s ease; z-index: 1000; box-shadow: -4px 0 15px rgba(0,0,0,0.5);">
  
  <div style="min-height: 50px; border-bottom: 1px solid #26262c; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; background: #0e0e10;">
    <button id="closeChatBtn" style="background: transparent; color: #efeff1; border: none; cursor: pointer; padding: 6px; border-radius: 4px; display: flex; align-items: center; justify-content: center;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" title="Collapse Chat">
      <span class="material-symbols-outlined">keyboard_tab</span>
    </button>
    <span style="font-weight: 600; font-size: 13px; color: #efeff1; text-transform: uppercase;">Stream Chat</span>
    <div style="width: 36px;"></div>
  </div>

  <div style="padding: 10px; border-bottom: 1px solid #26262c; font-size: 12px; color: #aaa; display: flex; justify-content: space-between; align-items: center; background: #18181b;">
    <div style="display: flex; gap: 12px;">
        <label style="cursor: pointer; display: flex; align-items: center; gap: 4px;">
            <input type="checkbox" id="toggleTimestamps"> Time
        </label>
        <label style="cursor: pointer; display: flex; align-items: center; gap: 4px;">
            <input type="checkbox" id="toggleGameFilter"> Filter
        </label>
    </div>
    <span id="gameContextBadge" style="background: #333; padding: 2px 6px; border-radius: 4px; display: none;"></span>
  </div>

  <div id="chatBox" style="flex-grow: 1; overflow-y: auto; padding: 10px; color: #efeff1; background: #0e0e10;">
      <em>Loading messages...</em>
  </div>

  <div style="border-top: 1px solid #26262c; background: #18181b; padding: 15px 10px;">
      
      <div id="loginSection" style="display: none;">
          <p style="margin-top: 0; margin-bottom: 10px; color: #aaa; font-size: 13px;">Log in to chat:</p>
          <div style="display: flex; gap: 8px; flex-wrap: wrap;">
              <button onclick="login('twitch')" class="btn" style="flex: 1; background: #9146FF; color: white; border: none; padding: 8px; border-radius: 4px; font-size: 12px; cursor: pointer;">Twitch</button>
              <button onclick="login('discord')" class="btn" style="flex: 1; background: #5865F2; color: white; border: none; padding: 8px; border-radius: 4px; font-size: 12px; cursor: pointer;">Discord</button>
          </div>
          <button onclick="login('google')" class="btn" style="width: 100%; margin-top: 8px; background: #DB4437; color: white; border: none; padding: 8px; border-radius: 4px; font-size: 12px; cursor: pointer;">Google</button>
      </div>

      <div id="inputSection" style="display: none;">
          <div style="margin-bottom: 10px; font-size: 12px; color: #aaa; display: flex; justify-content: space-between; align-items: center;">
              <div>
                  <strong id="userNameDisplay" style="color: #fff;"></strong> 
                  <a href="#" onclick="logout(); return false;" style="color: #e74c3c; margin-left: 5px; text-decoration: none;">[Logout]</a>
              </div>
              <input type="color" id="userColor" style="background: none; border: none; cursor: pointer; height: 20px; width: 20px; padding: 0;">
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
              <button id="grabTimeBtn" class="btn" style="padding: 10px; background: #26262c; color: #aaa; border: none; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center;" title="Insert current video time">
                  <span class="material-symbols-outlined" style="font-size: 18px;">schedule</span>
              </button>
              <input type="text" id="chatInput" placeholder="Send a message" style="padding: 10px; flex-grow: 1; background: #0e0e10; color: #fff; border: 1px solid #3a3a3d; border-radius: 4px; outline: none; transition: border 0.2s;">
              <button id="sendBtn" class="btn btn-gray" style="padding: 10px 15px; background: #e67e22; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Chat</button>
          </div>
          <p id="statusMessage" style="color: #2ecc71; height: 16px; margin: 5px 0 0 0; font-size: 12px; text-align: center;"></p>
      </div>
  </div>
</div>

<style>
/* Restored Squish Effect */
body { transition: padding-right 0.3s ease; }
body.chat-open-squish { padding-right: 340px; }

#chatInput:focus { border-color: #e67e22 !important; }
.chat-msg { margin-bottom: 8px; line-height: 1.4; display: flex; align-items: flex-start; gap: 8px; font-size: 13px; word-break: break-word; }
.chat-timestamp { font-size: 11px; color: #adadb8; display: none; margin-top: 3px; white-space: nowrap; }
.show-timestamps .chat-timestamp { display: inline-block; }
.admin-btn { background: none; border: none; cursor: pointer; font-size: 12px; opacity: 0.3; padding: 0 4px; }
.admin-btn:hover { opacity: 1; }
.msg-deleted { opacity: 0.4; text-decoration: line-through; }
#chatBox::-webkit-scrollbar { width: 8px; }
#chatBox::-webkit-scrollbar-track { background: transparent; }
#chatBox::-webkit-scrollbar-thumb { background: #3a3a3d; border-radius: 4px; }
.yt-time-link { color: #e67e22; text-decoration: none; font-weight: 500; transition: opacity 0.2s; }
.yt-time-link:hover { opacity: 0.8; text-decoration: underline; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 1. GUARANTEE UI VISIBILITY IMMEDIATELY
const chatSidebar = document.getElementById('chatSidebar');
const openChatBtn = document.getElementById('openChatBtn');
const closeChatBtn = document.getElementById('closeChatBtn');
const chatBox = document.getElementById('chatBox');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const statusMessage = document.getElementById('statusMessage');
const loginSection = document.getElementById('loginSection');
const inputSection = document.getElementById('inputSection');
const userNameDisplay = document.getElementById('userNameDisplay');
const userColorPicker = document.getElementById('userColor');
const toggleTimestamps = document.getElementById('toggleTimestamps');
const toggleGameFilter = document.getElementById('toggleGameFilter');
const gameContextBadge = document.getElementById('gameContextBadge');
const grabTimeBtn = document.getElementById('grabTimeBtn');

let isChatOpen = localStorage.getItem('chatOpen') !== 'false'; 
function updateChatVisibility() {
    if (isChatOpen) {
        chatSidebar.style.right = '0';
        openChatBtn.style.display = 'none';
        document.body.classList.add('chat-open-squish');
    } else {
        chatSidebar.style.right = '-350px';
        openChatBtn.style.display = 'flex';
        document.body.classList.remove('chat-open-squish');
    }
    localStorage.setItem('chatOpen', isChatOpen);
}
openChatBtn.addEventListener('click', () => { isChatOpen = true; updateChatVisibility(); });
closeChatBtn.addEventListener('click', () => { isChatOpen = false; updateChatVisibility(); });
updateChatVisibility();

// 2. TIMESTAMPS (Piggybacking on your existing global 'player' variable)
grabTimeBtn.addEventListener('click', () => {
    // Check if the watch layout's 'player' exists and is ready
    if (typeof player !== 'undefined' && player && typeof player.getCurrentTime === 'function') {
        const time = player.getCurrentTime();
        const h = Math.floor(time / 3600);
        const m = Math.floor((time % 3600) / 60);
        const s = Math.floor(time % 60);
        
        let timeStr = h > 0 ? `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}` : `${m}:${s.toString().padStart(2, '0')}`;
        chatInput.value += (chatInput.value.length > 0 && !chatInput.value.endsWith(' ') ? ' ' : '') + `(${timeStr}) `;
        chatInput.focus();
    } else {
        statusMessage.textContent = "Play video to grab time.";
        statusMessage.style.color = "#e74c3c";
        setTimeout(() => statusMessage.textContent = "", 2000);
    }
});

// 3. STANDARD CHAT SETUP
const supabaseUrl = '{{ site.supabase_url }}';
const supabaseKey = '{{ site.supabase_anon_key }}';
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let currentSession = null;
let isAdmin = false;

toggleTimestamps.checked = localStorage.getItem('showTimestamps') === 'true';
if (toggleTimestamps.checked) chatBox.classList.add('show-timestamps');
toggleTimestamps.addEventListener('change', (e) => {
    localStorage.setItem('showTimestamps', e.target.checked);
    e.target.checked ? chatBox.classList.add('show-timestamps') : chatBox.classList.remove('show-timestamps');
});

toggleGameFilter.checked = localStorage.getItem('filterGame') === 'true';
toggleGameFilter.addEventListener('change', (e) => {
    localStorage.setItem('filterGame', e.target.checked);
    loadMessages();
});

let currentGame = 'general';
const pathParts = window.location.pathname.split('/game/');
if (pathParts.length > 1) currentGame = pathParts[1].split('/')[0] || 'general';
if (gameContextBadge) {
    gameContextBadge.textContent = currentGame;
    if (currentGame !== 'general') gameContextBadge.style.display = 'inline-block';
}

function formatTime(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const time = `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
    if (d.toDateString() === now.toDateString()) return time;
    if (d.getFullYear() === now.getFullYear()) return `${d.getMonth()+1}/${d.getDate()} ${time}`;
    return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear().toString().slice(-2)} ${time}`;
}

async function login(provider) { await supabaseClient.auth.signInWithOAuth({ provider: provider, options: { redirectTo: window.location.origin + window.location.pathname }}); }
async function logout() { await supabaseClient.auth.signOut(); }
async function setDeletedState(id, state) { await supabaseClient.from('letstrygg_chat').update({ is_deleted: state }).eq('id', id); }

let authTimeout = null;
supabaseClient.auth.onAuthStateChange((event, session) => {
    clearTimeout(authTimeout);
    authTimeout = setTimeout(async () => {
        currentSession = session;
        if (session) {
            loginSection.style.display = 'none';
            inputSection.style.display = 'block';
            isAdmin = session.user.email === 'letstrygg@gmail.com';
            
            const { data: profile } = await supabaseClient.from('letstrygg_profiles').select('username, color').eq('user_id', session.user.id).maybeSingle();
            if (profile) {
                userNameDisplay.textContent = profile.username;
                userColorPicker.value = profile.color;
            }
        } else {
            loginSection.style.display = 'block';
            inputSection.style.display = 'none';
            isAdmin = false;
        }
        loadMessages(); 
    }, 100); 
});

userColorPicker.addEventListener('change', async (e) => {
    if (!currentSession) return;
    await supabaseClient.from('letstrygg_profiles').update({ color: e.target.value }).eq('user_id', currentSession.user.id);
});

async function loadMessages() {
    let query = supabaseClient.from('letstrygg_chat').select('*, letstrygg_profiles(username, color)').order('created_at', { ascending: true }).limit(50);
    if (toggleGameFilter && toggleGameFilter.checked) query = query.eq('game_context', currentGame);

    const { data, error } = await query;
    if (error) { chatBox.innerHTML = `<span style="color:#e74c3c;">Failed to load messages.</span>`; return; }
    
    if (data && data.length > 0) {
        chatBox.innerHTML = ''; 
        data.forEach(row => {
            if (row.is_deleted && !isAdmin) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-msg' + (row.is_deleted ? ' msg-deleted' : '');
            
            let adminHtml = '';
            if (isAdmin) {
                adminHtml = row.is_deleted 
                    ? `<button class="admin-btn" title="Restore" onclick="setDeletedState(${row.id}, false)">♻️</button>`
                    : `<button class="admin-btn" title="Delete" onclick="setDeletedState(${row.id}, true)">🗑️</button>`;
            }

            const profile = row.letstrygg_profiles || {};
            const displayName = profile.username || 'Anon';
            const displayColor = profile.color || '#ffffff';

            const urlIconHtml = row.url ? `<a href="${row.url}" target="_blank" title="Go to page" style="color: #666; display: flex; align-items: center; text-decoration: none; margin-top: 1px;"><span class="material-symbols-outlined" style="font-size: 15px;">smart_display</span></a>` : '';

            let formattedMessage = row.message;
            if (row.url) {
                formattedMessage = formattedMessage.replace(/\((\d{1,2}:\d{2}(?::\d{2})?)\)/g, (match, timeStr) => {
                    let parts = timeStr.split(':').reverse();
                    let seconds = 0;
                    for (let i = 0; i < parts.length; i++) seconds += parseInt(parts[i]) * Math.pow(60, i);
                    return `<a href="${row.url}?t=${seconds}" class="yt-time-link" target="_blank">(${timeStr})</a>`;
                });
            }

            msgDiv.innerHTML = `
                <span class="chat-timestamp">${formatTime(row.created_at)}</span>
                ${urlIconHtml}
                <div style="flex-grow: 1;">
                    <strong style="color: ${displayColor};">${displayName}:</strong> 
                    ${formattedMessage}
                </div>
                ${adminHtml}
            `;
            chatBox.appendChild(msgDiv);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    } else {
        chatBox.innerHTML = '<em style="color:#adadb8;">Welcome to the chat room!</em>';
    }
}

const chatChannel = supabaseClient.channel('chat_updates');
chatChannel.on('postgres_changes', { event: '*', schema: 'public', table: 'letstrygg_chat' }, payload => { loadMessages(); });
chatChannel.on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'letstrygg_profiles' }, payload => { loadMessages(); });
chatChannel.subscribe();

sendBtn.addEventListener('click', async () => {
    const text = chatInput.value.trim();
    if (!text || !currentSession) return;
    sendBtn.disabled = true;
    
    const { error } = await supabaseClient.from('letstrygg_chat').insert([{ 
        message: text, 
        user_id: currentSession.user.id, 
        game_context: currentGame,
        url: window.location.pathname 
    }]);
    
    if (!error) chatInput.value = ""; 
    sendBtn.disabled = false;
});
chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendBtn.click(); });
</script>
