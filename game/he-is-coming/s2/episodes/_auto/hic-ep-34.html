                    <button onclick="window.location.href='/game/he-is-coming/s2/episodes/hic-ep-33.html'" class="overlay-btn overlay-side overlay-left tooltip-left-edge" data-tooltip="Previous Episode" style="position: relative;"><span class="material-symbols-outlined">arrow_back_ios_new</span></button>
                    <button onclick="window.location.href='/game/he-is-coming/s2/episodes/hic-ep-35.html'" class="overlay-btn overlay-side overlay-right tooltip-right-edge" data-tooltip="Next Episode" style="position: relative;"><span class="material-symbols-outlined">arrow_forward_ios</span></button>
                    
                    <div style="position: absolute; bottom: 60px; left: 15px; z-index: 20;">
                        <button id="resume-btn" class="overlay-btn tooltip-left-edge" style="display: none; background: rgba(231, 76, 60, 0.9); padding: 4px 12px; border-radius: 4px; font-weight: bold; width: auto; flex-direction: row; gap: 4px; align-items: center; position: relative;" data-tooltip="Return to your saved place">

<script>
  var storageKey = 'yt_resume_Wwh927grX0U';
  var originalSavedTime = parseFloat(localStorage.getItem(storageKey)) || 0;
  
  var urlParams = new URLSearchParams(window.location.search);
  var urlTime = urlParams.get('t') ? parseFloat(urlParams.get('t')) : null;
  
  var isPreviewing = urlTime !== null && originalSavedTime > 0 && Math.abs(urlTime - originalSavedTime) > 5;
  var startTime = urlTime !== null ? urlTime : originalSavedTime;

  var tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  var firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  var player;
  var saveInterval;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('ytplayer', {
      videoId: 'Wwh927grX0U',
      playerVars: {
        'autoplay': 1, 'rel': 0, 'modestbranding': 1, 'fs': 1,
        'start': Math.floor(startTime)
      },
      events: { 'onStateChange': onPlayerStateChange }
    });
  }

  function onPlayerStateChange(event) {
    if (event.data === 1) {
        if (!saveInterval) {
            saveInterval = setInterval(function() {
                if (!isPreviewing) {
                    localStorage.setItem(storageKey, player.getCurrentTime());
                }
            }, 5000);
        }
    } else {
        clearInterval(saveInterval);
        saveInterval = null;
    }

    if (event.data === 0) {
        localStorage.removeItem(storageKey);
        const nextEpisodeUrl = "/game/he-is-coming/s2/episodes/hic-ep-35.html";
        if (nextEpisodeUrl) window.location.href = nextEpisodeUrl;
    }
  }

  const wrapper = document.getElementById('player-wrapper');
  const overlay = document.getElementById('video-overlay');
  let idleTimer;

  function resetIdleTimer() {
      overlay.style.opacity = '1';
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => { overlay.style.opacity = '0'; }, 3500);
  }

  wrapper.addEventListener('mousemove', resetIdleTimer);
  wrapper.addEventListener('mouseleave', () => {
      clearTimeout(idleTimer);
      overlay.style.opacity = '0'; 
  });
  resetIdleTimer();

  const resumeBtn = document.getElementById('resume-btn');
  const resumeText = document.getElementById('resume-time-text');
  
  function updateResumeButtonUI(timeVal) {
      resumeBtn.style.display = 'inline-flex';
      let h = Math.floor(timeVal / 3600);
      let m = Math.floor((timeVal % 3600) / 60);
      let s = Math.floor(timeVal % 60);
      resumeText.innerText = 'Resume ' + (h > 0 ? h + ':' + m.toString().padStart(2,'0') + ':' + s.toString().padStart(2,'0') : m + ':' + s.toString().padStart(2,'0'));
  }

  resumeBtn.addEventListener('click', function() {
      isPreviewing = false; 
      player.seekTo(originalSavedTime, true);
      resumeBtn.style.display = 'none';
      history.replaceState(null, '', window.location.pathname); 
  });

  if (isPreviewing) {
      updateResumeButtonUI(originalSavedTime);
  }

  window.triggerInPageJump = function(targetSeconds) {
      if (typeof player === 'undefined' || !player || typeof player.getCurrentTime !== 'function') return;
      
      if (!isPreviewing) {
          originalSavedTime = player.getCurrentTime();
          isPreviewing = true;
      }
      
      player.seekTo(targetSeconds, true);
      updateResumeButtonUI(originalSavedTime);
  };

  const copyBtn = document.getElementById('copy-time-btn');
  copyBtn.addEventListener('click', function() {
      if (player && player.getCurrentTime) {
          const t = Math.floor(player.getCurrentTime());
          const url = "https://youtu.be/Wwh927grX0U?t=" + t + "s";
          navigator.clipboard.writeText(url).then(() => {
              const icon = document.getElementById('copy-icon');
              icon.innerText = 'check'; 
              copyBtn.setAttribute('data-tooltip', 'Copied!');
              setTimeout(() => { 
                  icon.innerText = 'link'; 
                  copyBtn.setAttribute('data-tooltip', 'Copy Timestamp');
              }, 2000);
          });
      }
  });

  const tIcon = document.getElementById('theater-icon');
  const tBtn = document.getElementById('theater-btn');
  tBtn.addEventListener('click', function() {
      const isTheater = wrapper.classList.toggle('theater-active');
      if (isTheater) {
          wrapper.style.position = 'fixed';
          wrapper.style.top = '0'; wrapper.style.left = '0';
          wrapper.style.width = '100vw'; wrapper.style.height = '100vh';
          wrapper.style.maxWidth = '100vw'; 
          wrapper.style.zIndex = '9999'; document.body.style.overflow = 'hidden';
          tIcon.innerText = 'close_fullscreen'; tBtn.setAttribute('data-tooltip', 'Exit Theater');
      } else {
          wrapper.style.position = 'relative';
          wrapper.style.top = 'auto'; wrapper.style.left = 'auto';
          wrapper.style.width = '100%'; wrapper.style.height = 'auto';
          wrapper.style.maxWidth = 'none'; 
          wrapper.style.zIndex = '10'; document.body.style.overflow = '';
          tIcon.innerText = 'width_full'; tBtn.setAttribute('data-tooltip', 'Theater Mode');
      }
  });
</script>
