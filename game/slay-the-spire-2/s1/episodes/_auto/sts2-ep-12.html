<script>
  var storageKey = 'yt_resume_4jufiQdgxJY';
  var savedTime = localStorage.getItem(storageKey) || 0;

  var tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  var firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  var player;
  var saveInterval;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('ytplayer', {
      videoId: '4jufiQdgxJY',
      playerVars: {
        'autoplay': 1,
        'rel': 0,
        'modestbranding': 1,
        'fs': 1,
        'start': Math.floor(savedTime)
      },
      events: {
        'onStateChange': onPlayerStateChange
      }
    });
  }

  function onPlayerStateChange(event) {
    if (event.data === 1) {
        if (!saveInterval) {
            saveInterval = setInterval(function() {
                localStorage.setItem(storageKey, player.getCurrentTime());
            }, 5000);
        }
    } else {
        clearInterval(saveInterval);
        saveInterval = null;
    }

    if (event.data === 0) {
        localStorage.removeItem(storageKey);
        const nextEpisodeUrl = "";
        if (nextEpisodeUrl) {
            window.location.href = nextEpisodeUrl;
        }
    }
  }

  // Overlay Idle Hide Logic
  const wrapper = document.getElementById('player-wrapper');
  const overlay = document.getElementById('video-overlay');
  let idleTimer;

  function resetIdleTimer() {
      overlay.style.opacity = '1';
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
          overlay.style.opacity = '0';
      }, 2500);
  }

  wrapper.addEventListener('mousemove', resetIdleTimer);
  wrapper.addEventListener('mouseleave', () => {
      clearTimeout(idleTimer);
      overlay.style.opacity = '0'; 
  });
  resetIdleTimer();

  // Copy Timestamp Logic
  document.getElementById('copy-time-btn').addEventListener('click', function() {
      if (player && player.getCurrentTime) {
          const t = Math.floor(player.getCurrentTime());
          const url = "https://youtu.be/4jufiQdgxJY?t=" + t + "s";
          navigator.clipboard.writeText(url).then(() => {
              const icon = document.getElementById('copy-icon');
              icon.innerText = 'check'; // Changes to a checkmark!
              setTimeout(() => { icon.innerText = 'link'; }, 2000);
          });
      }
  });

  // Theater Mode Logic
  const tIcon = document.getElementById('theater-icon');

  document.getElementById('theater-btn').addEventListener('click', function() {
      const isTheater = wrapper.classList.toggle('theater-active');
      
      if (isTheater) {
          wrapper.style.position = 'fixed';
          wrapper.style.top = '0';
          wrapper.style.left = '0';
          wrapper.style.width = '100vw';
          wrapper.style.height = '100vh';
          wrapper.style.paddingBottom = '0'; 
          wrapper.style.margin = '0';
          wrapper.style.zIndex = '9999';
          document.body.style.overflow = 'hidden';
          
          tIcon.innerText = 'close_fullscreen';
          this.title = 'Exit Theater';
      } else {
          wrapper.style.position = 'relative';
          wrapper.style.top = 'auto';
          wrapper.style.left = 'auto';
          wrapper.style.width = '100%';
          wrapper.style.height = '0';
          wrapper.style.paddingBottom = '56.25%'; 
          wrapper.style.margin = '0 0 15px 0';
          wrapper.style.zIndex = '10';
          document.body.style.overflow = '';
          
          tIcon.innerText = 'width_full';
          this.title = 'Toggle Theater Mode';
      }
  });
</script>
