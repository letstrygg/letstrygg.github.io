<div class="game-section auto-generated-stats" style="margin-top: 0;">
    <div style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 20px;">
        <div style="width: 100%; max-width: calc((100vh - 75px) * 16 / 9);">
            
            <div id="player-wrapper" style="position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; margin-bottom: 5px; transition: all 0.3s ease; z-index: 10;">
                
                <div id="video-overlay" class="video-overlay" style="z-index: 20;">
                    <div class="overlay-bottom">
                        <button id="theater-btn" class="overlay-btn" data-tooltip="Theater Mode">
                            <span class="material-symbols-outlined" id="theater-icon">width_full</span>
                        </button>
                    </div>
                </div>

                <div id="stream-embed-target" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">
                    Loading Video...
                </div>
            </div>

        </div>
    </div>
</div>

<script>
let currentVideoId = '';

async function loadVideoFromHash() {
    const hash = window.location.hash.substring(1); 
    if (!hash) return;
    
    currentVideoId = hash;

    try {
        // 1. Fetch the lightweight dictionary Jekyll built
        const response = await fetch('/youtube-map.json');
        const videoMap = await response.json();

        // 2. Check if the ID exists in the dictionary
        if (videoMap[currentVideoId]) {
            // MATCH FOUND! Instantly redirect to the real episode page.
            // Using replace() so hitting the 'Back' button doesn't trap them in a loop.
            window.location.replace(videoMap[currentVideoId]);
            return; // Stop running code on this page
        }
    } catch (e) {
        console.error("Failed to load video map", e);
    }

    // 3. NO MATCH FOUND: Render the normal VOD embed
    renderVideo();
}

function renderVideo() {
    const target = document.getElementById('stream-embed-target');
    target.innerHTML = `<iframe src="https://www.youtube.com/embed/${currentVideoId}?autoplay=1&rel=0" frameborder="0" allowfullscreen="true" height="100%" width="100%"></iframe>`;
    window.dispatchEvent(new CustomEvent('topicChanged', { detail: currentVideoId }));
}

// ... [Keep Theater Mode and Overlay logic below this] ...

// Theater Mode Logic
const wrapper = document.getElementById('player-wrapper');
const tIcon = document.getElementById('theater-icon');
const tBtn = document.getElementById('theater-btn');

if (tBtn) {
    tBtn.addEventListener('click', function() {
        const isTheater = wrapper.classList.toggle('theater-active');
        if (isTheater) {
            document.body.style.overflow = 'hidden';
            tIcon.innerText = 'close_fullscreen'; 
            tBtn.setAttribute('data-tooltip', 'Exit Theater');
        } else {
            document.body.style.overflow = '';
            tIcon.innerText = 'width_full'; 
            tBtn.setAttribute('data-tooltip', 'Theater Mode');
        }
    });
}

// UI Overlay Hover Logic
const overlay = document.getElementById('video-overlay');
let idleTimer;
function resetIdleTimer() {
    overlay.style.opacity = '1';
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => { overlay.style.opacity = '0'; }, 3500);
}
wrapper.addEventListener('mousemove', resetIdleTimer);
wrapper.addEventListener('mouseleave', () => {
    clearTimeout(idleTimer);
    overlay.style.opacity = '0'; 
});
resetIdleTimer();

// Initialize on load and hash change
window.addEventListener('load', loadVideoFromHash);
window.addEventListener('hashchange', loadVideoFromHash);
</script>
