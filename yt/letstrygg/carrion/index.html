<style>
/* Generic Component System */
.panel {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    background: transparent;
}

.panel-header {
    display: flex;
    justify-content: space-between;

    margin: 0px 4px 4px 4px;
}

.label {

}

/* Zone 1: Generic Content Block */
.content {
    display: flex;
    flex-direction: column;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s ease;
}

.content:hover {
    border-color: var(--border-hover);
}

.content img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
}

.content-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 15px;
    gap: 12px;
}

/* Zone 2: Generic Info Block */
.info {
    display: flex;
    flex-direction: column;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 15px;
    margin-top: 10px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.2s ease, border-color 0.2s ease;
}

.info:hover {
    background: var(--bg3);
    border-color: var(--border-hover);
}

.info:hover .info-cta {
    color: var(--blue);
}

.info-stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
    font-size: 0.85rem;
    flex-wrap: wrap; /* Ensures the 5 items wrap cleanly on small screens */
}

.info-stats span {

    align-items: center;
    gap: 4px;
}

.info-cta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    font-weight: bold;
    color: var(--gray);
    border-top: 1px solid var(--border);
    padding-top: 10px;
    transition: color 0.2s;
}

/* Simple hover brighten for the YT link */
.yt-header-link {
    opacity: 0.7;
    transition: opacity 0.2s;
}
.yt-header-link:hover {
    opacity: 1;
}
