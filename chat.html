---
layout: new
title: Live Chat
permalink: /chat/
---

<div class="game-page-wrapper">
  <div class="manual-content">
      <h1 class="title">Live Chat</h1>

      <div style="margin-bottom: 10px; display: flex; gap: 15px; font-size: 13px; color: #aaa; align-items: center;">
          <label style="cursor: pointer;">
              <input type="checkbox" id="toggleTimestamps"> Show Timestamps
          </label>
          <label style="cursor: pointer;">
              <input type="checkbox" id="toggleGameFilter"> Filter by current game
          </label>
          <span id="gameContextBadge" style="background: #333; padding: 2px 6px; border-radius: 4px; display: none;"></span>
      </div>

      <div id="chatBox" style="height: 400px; max-width: 600px; overflow-y: auto; background: #111; border: 1px solid #444; padding: 10px; margin-bottom: 10px; color: #ccc; border-radius: 4px;">
          <em>Loading messages...</em>
      </div>
      
      <div id="loginSection" style="margin-bottom: 20px; padding: 15px; background: #1a1a1a; border-radius: 4px; max-width: 600px; border: 1px solid #333;">
          <p style="margin-top: 0; margin-bottom: 10px; color: #aaa;">Log in to send messages:</p>
          <div style="display: flex; gap: 10px;">
              <button onclick="login('twitch')" class="btn" style="background: #9146FF; color: white; border: none;">Twitch</button>
              <button onclick="login('discord')" class="btn" style="background: #5865F2; color: white; border: none;">Discord</button>
              <button onclick="login('google')" class="btn" style="background: #DB4437; color: white; border: none;">Google</button>
          </div>
      </div>

      <div id="inputSection" style="margin-bottom: 20px; display: none; max-width: 600px;">
          <div style="margin-bottom: 10px; font-size: 0.9em; color: #aaa; display: flex; justify-content: space-between; align-items: center;">
              <div>
                  Logged in as <strong id="userNameDisplay" style="color: #fff;"></strong> 
                  <a href="#" onclick="logout(); return false;" style="color: #e74c3c; margin-left: 10px; text-decoration: underline;">Log out</a>
              </div>
              <div style="display: flex; align-items: center; gap: 5px;">
                  <label for="userColor" style="font-size: 12px;">Color:</label>
                  <input type="color" id="userColor" style="background: none; border: none; cursor: pointer; height: 24px; width: 24px; padding: 0;">
              </div>
          </div>
          <div style="display: flex; gap: 10px;">
              <input type="text" id="chatInput" placeholder="Type a message..." style="padding: 10px; flex-grow: 1; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;">
              <button id="sendBtn" class="btn btn-gray" style="padding: 10px 15px;">Send</button>
          </div>
      </div>

      <p id="statusMessage" style="color: #2ecc71; height: 20px; margin: 0;"></p>
  </div>
</div>

<style>
  .chat-msg { margin-bottom: 8px; line-height: 1.4; display: flex; align-items: flex-start; gap: 8px; }
  .chat-timestamp { font-size: 11px; color: #666; display: none; margin-top: 3px; white-space: nowrap; }
  .show-timestamps .chat-timestamp { display: inline-block; }
  .admin-btn { background: none; border: none; cursor: pointer; font-size: 12px; opacity: 0.3; padding: 0 4px; }
  .admin-btn:hover { opacity: 1; }
  .msg-deleted { opacity: 0.4; text-decoration: line-through; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const chatBox = document.getElementById('chatBox');
  chatBox.innerHTML = ''; // Clear out the "Loading..." text immediately

  // Safe visual logger
  function logStep(msg) {
      console.log(msg);
      const logDiv = document.createElement('div');
      logDiv.style.color = '#f1c40f';
      logDiv.style.fontFamily = 'monospace';
      logDiv.style.fontSize = '12px';
      logDiv.style.marginBottom = '4px';
      logDiv.textContent = `[DEBUG] ${msg}`;
      chatBox.appendChild(logDiv);
  }

  // Catch hard crashes safely
  window.onerror = function(msg, url, line) {
      logStep(`CRITICAL JS CRASH: ${msg} at line ${line}`);
      return false;
  };

  window.addEventListener('unhandledrejection', function(event) {
      logStep(`SILENT PROMISE FAILURE: ${event.reason}`);
  });

  try {
      logStep("1. Script initializing.");

      // Using your Jekyll variables exactly as they were
      const supabaseUrl = '{{ site.supabase_url }}';
      const supabaseKey = '{{ site.supabase_anon_key }}';
      
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
      logStep("2. Supabase client successfully created.");

      const loginSection = document.getElementById('loginSection');
      const inputSection = document.getElementById('inputSection');
      const userNameDisplay = document.getElementById('userNameDisplay');
      const userColorPicker = document.getElementById('userColor');
      const toggleTimestamps = document.getElementById('toggleTimestamps');
      const toggleGameFilter = document.getElementById('toggleGameFilter');
      
      let currentGame = 'general';
      const pathParts = window.location.pathname.split('/game/');
      if (pathParts.length > 1) currentGame = pathParts[1].split('/')[0] || 'general';

      let currentSession = null;
      let isAdmin = false;

      logStep("3. Setting up Auth Listener...");

      supabaseClient.auth.onAuthStateChange(async (event, session) => {
          logStep(`4. Auth Event: ${event}. Session exists? ${!!session}`);
          currentSession = session;

          if (session) {
              loginSection.style.display = 'none';
              inputSection.style.display = 'block';
              isAdmin = session.user.email === 'letstrygg@gmail.com';
              
              logStep(`5. Fetching profile for user ID: ${session.user.id}...`);
              
              const { data: profile, error } = await supabaseClient
                  .from('letstrygg_profiles')
                  .select('username, color')
                  .eq('user_id', session.user.id)
                  .maybeSingle();

              if (error) {
                  logStep(`🚨 PROFILE ERROR: ${error.message}`);
              } else if (profile) {
                  logStep(`6. Profile found! Username: ${profile.username}`);
                  userNameDisplay.textContent = profile.username;
                  userColorPicker.value = profile.color;
              } else {
                  logStep("🚨 NO PROFILE ROW FOUND IN DATABASE.");
              }
          } else {
              logStep("5. User is logged out. Showing login buttons.");
              loginSection.style.display = 'block';
              inputSection.style.display = 'none';
              isAdmin = false;
          }
          
          logStep("7. Attempting to load messages...");
          loadMessages(); 
      });

      async function loadMessages() {
          logStep("-> Executing query to letstrygg_chat table...");
          
          let query = supabaseClient
              .from('letstrygg_chat')
              .select('*, letstrygg_profiles(username, color)')
              .order('created_at', { ascending: true })
              .limit(50); // Added limit just in case payload is too large
              
          if (toggleGameFilter && toggleGameFilter.checked) {
              query = query.eq('game_context', currentGame);
          }

          const { data, error } = await query;
          
          if (error) { 
              logStep(`🚨 LOAD MESSAGES ERROR: ${error.message}`);
              return; 
          }

          logStep(`-> Messages loaded! Row count: ${data ? data.length : 0}`);
          
          // Only clear the debug logs if we actually successfully pulled messages to show
          if (data && data.length > 0) {
              chatBox.innerHTML = ''; 
              // (Message rendering code temporarily omitted here so we can clearly see the logs, 
              // it will just say 'Row count: X' at the bottom of the yellow text)
          }
      }

  } catch (err) {
      logStep(`🚨 FATAL EXECUTION ERROR: ${err.message}`);
  }
</script>
