---
layout: new
title: Live Chat
permalink: /chat/
---

<div class="game-page-wrapper">
  <div class="manual-content">
      <h1 class="title">Live Chat</h1>

      <div style="margin-bottom: 10px; display: flex; gap: 15px; font-size: 13px; color: #aaa; align-items: center;">
          <label style="cursor: pointer;">
              <input type="checkbox" id="toggleTimestamps"> Show Timestamps
          </label>
          <label style="cursor: pointer;">
              <input type="checkbox" id="toggleGameFilter"> Filter by current game
          </label>
          <span id="gameContextBadge" style="background: #333; padding: 2px 6px; border-radius: 4px; display: none;"></span>
      </div>

      <div id="chatBox" style="height: 400px; max-width: 600px; overflow-y: auto; background: #111; border: 1px solid #444; padding: 10px; margin-bottom: 10px; color: #ccc; border-radius: 4px;">
          <em>Loading messages...</em>
      </div>
      
      <div id="loginSection" style="margin-bottom: 20px; padding: 15px; background: #1a1a1a; border-radius: 4px; max-width: 600px; border: 1px solid #333;">
          <p style="margin-top: 0; margin-bottom: 10px; color: #aaa;">Log in to send messages:</p>
          <div style="display: flex; gap: 10px;">
              <button onclick="login('twitch')" class="btn" style="background: #9146FF; color: white; border: none;">Twitch</button>
              <button onclick="login('discord')" class="btn" style="background: #5865F2; color: white; border: none;">Discord</button>
              <button onclick="login('google')" class="btn" style="background: #DB4437; color: white; border: none;">Google</button>
          </div>
      </div>

      <div id="inputSection" style="margin-bottom: 20px; display: none; max-width: 600px;">
          <div style="margin-bottom: 10px; font-size: 0.9em; color: #aaa; display: flex; justify-content: space-between; align-items: center;">
              <div>
                  Logged in as <strong id="userNameDisplay" style="color: #fff;"></strong> 
                  <a href="#" onclick="logout(); return false;" style="color: #e74c3c; margin-left: 10px; text-decoration: underline;">Log out</a>
              </div>
              <div style="display: flex; align-items: center; gap: 5px;">
                  <label for="userColor" style="font-size: 12px;">Color:</label>
                  <input type="color" id="userColor" style="background: none; border: none; cursor: pointer; height: 24px; width: 24px; padding: 0;">
              </div>
          </div>
          <div style="display: flex; gap: 10px;">
              <input type="text" id="chatInput" placeholder="Type a message..." style="padding: 10px; flex-grow: 1; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;">
              <button id="sendBtn" class="btn btn-gray" style="padding: 10px 15px;">Send</button>
          </div>
      </div>

      <p id="statusMessage" style="color: #2ecc71; height: 20px; margin: 0;"></p>
  </div>
</div>

<style>
  .chat-msg { margin-bottom: 8px; line-height: 1.4; display: flex; align-items: flex-start; gap: 8px; }
  .chat-timestamp { font-size: 11px; color: #666; display: none; margin-top: 3px; white-space: nowrap; }
  .show-timestamps .chat-timestamp { display: inline-block; }
  .admin-btn { background: none; border: none; cursor: pointer; font-size: 12px; opacity: 0.3; padding: 0 4px; }
  .admin-btn:hover { opacity: 1; }
  .msg-deleted { opacity: 0.4; text-decoration: line-through; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const chatBox = document.getElementById('chatBox');
  chatBox.innerHTML = ''; // Clear out the "Loading..." text immediately

  // Custom visual logger
  function debugLog(msg) {
      console.log(msg);
      chatBox.innerHTML += `<div style="color: #f1c40f; font-family: monospace; font-size: 13px; margin-bottom: 4px;">[DEBUG] ${msg}</div>`;
  }

  // Catch hard crashes
  window.onerror = function(msg, url, line) {
      debugLog(`CRITICAL CRASH: ${msg} at line ${line}`);
      return false;
  };

  // Catch silent promise failures (like bad network requests)
  window.addEventListener('unhandledrejection', function(event) {
      debugLog(`SILENT FAILURE: ${event.reason}`);
  });

  try {
      debugLog("1. Script started initializing.");

      const supabaseUrl = '{{ site.supabase_url }}';
      const supabaseKey = '{{ site.supabase_anon_key }}';

      debugLog(`2. URL injected by Jekyll: ${supabaseUrl.substring(0, 20)}...`);
      
      // Check if Jekyll failed to replace the tags
      if (supabaseUrl.includes('{{')) {
          debugLog("🚨 FATAL: Jekyll did not inject your keys. It is reading the literal text '{{ site.supabase_url }}'.");
      }

      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
      debugLog("3. Supabase client created.");

      const loginSection = document.getElementById('loginSection');
      const inputSection = document.getElementById('inputSection');

      // Check Auth State
      debugLog("4. Setting up Auth Listener...");
      supabaseClient.auth.onAuthStateChange(async (event, session) => {
          debugLog(`5. Auth Event Fired: ${event}. Session exists? ${!!session}`);
          
          if (session) {
              loginSection.style.display = 'none';
              inputSection.style.display = 'block';
              debugLog(`6. Logged in as user ID: ${session.user.id.substring(0, 8)}... Fetching profile...`);
              
              const { data: profile, error } = await supabaseClient
                  .from('letstrygg_profiles')
                  .select('username, color')
                  .eq('user_id', session.user.id)
                  .maybeSingle();
                  
              if (error) debugLog(`🚨 Profile Fetch Error: ${error.message}`);
              else debugLog(`7. Profile Fetch Result: ${profile ? profile.username : 'NO PROFILE ROW FOUND'}`);
              
              debugLog("8. Triggering loadMessages()...");
              await loadMessages();
          } else {
              debugLog("6. No session detected. Showing login UI.");
              loginSection.style.display = 'block';
              inputSection.style.display = 'none';
              debugLog("7. Triggering loadMessages() for anonymous viewer...");
              await loadMessages();
          }
      });

      async function loadMessages() {
          debugLog("-> Inside loadMessages(). Requesting table data...");
          const { data, error } = await supabaseClient
              .from('letstrygg_chat')
              .select('*, letstrygg_profiles(username, color)')
              .limit(5); 
              
          if (error) {
              debugLog(`🚨 Load Messages Error: ${error.message}`);
          } else {
              debugLog(`-> Messages loaded successfully! Count: ${data ? data.length : 0}`);
          }
      }

  } catch (err) {
      debugLog(`🚨 EXECUTION ERROR: ${err.message}`);
  }
</script>
