---
layout: new
title: Live Chat
permalink: /chat/
---

<div class="game-page-wrapper">
  <div class="manual-content">
      <h1 class="title">Live Chat</h1>

      <div id="chatBox" style="height: 300px; max-width: 400px; overflow-y: auto; background: #111; border: 1px solid #444; padding: 10px; margin-bottom: 10px; color: #ccc; border-radius: 4px;">
          <em>Loading messages...</em>
      </div>
      
      <div id="loginSection" style="margin-bottom: 20px; padding: 15px; background: #1a1a1a; border-radius: 4px; max-width: 400px; border: 1px solid #333;">
          <p style="margin-top: 0; margin-bottom: 10px; color: #aaa;">Log in to send messages:</p>
          <div style="display: flex; gap: 10px;">
              <button onclick="login('twitch')" class="btn" style="background: #9146FF; color: white; border: none;">Twitch</button>
              <button onclick="login('discord')" class="btn" style="background: #5865F2; color: white; border: none;">Discord</button>
              <button onclick="login('google')" class="btn" style="background: #DB4437; color: white; border: none;">Google</button>
          </div>
      </div>

      <div id="inputSection" style="margin-bottom: 20px; display: none;">
          <div style="margin-bottom: 10px; font-size: 0.9em; color: #aaa;">
              Logged in as <strong id="userNameDisplay" style="color: #fff;"></strong> 
              <a href="#" onclick="logout(); return false;" style="color: #e74c3c; margin-left: 10px; text-decoration: underline;">Log out</a>
          </div>
          <div style="display: flex; gap: 10px;">
              <input type="text" id="chatInput" placeholder="Type a message..." style="padding: 10px; flex-grow: 1; max-width: 300px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;">
              <button id="sendBtn" class="btn btn-gray" style="padding: 10px 15px;">Send</button>
          </div>
      </div>

      <p id="statusMessage" style="color: #2ecc71; height: 20px; margin: 0;"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // 1. Initialize Supabase using Jekyll config variables
  const supabaseUrl = '{{ site.supabase_url }}';
  const supabaseKey = '{{ site.supabase_anon_key }}';
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
  
  // 2. Grab DOM Elements
  const chatBox = document.getElementById('chatBox');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const statusMessage = document.getElementById('statusMessage');
  const loginSection = document.getElementById('loginSection');
  const inputSection = document.getElementById('inputSection');
  const userNameDisplay = document.getElementById('userNameDisplay');

  let currentSession = null;

  // 3. Auth Listener (Fires on load and when login state changes)
  supabaseClient.auth.onAuthStateChange((event, session) => {
      currentSession = session;
      if (session) {
          // User is logged in
          loginSection.style.display = 'none';
          inputSection.style.display = 'block';
          
          // Try to pull the best display name from the provider's metadata
          const meta = session.user.user_metadata;
          const name = meta.preferred_username || meta.full_name || meta.name || 'User';
          userNameDisplay.textContent = name;
      } else {
          // User is logged out
          loginSection.style.display = 'block';
          inputSection.style.display = 'none';
      }
  });

  // 4. Login / Logout Functions
  async function login(provider) {
      await supabaseClient.auth.signInWithOAuth({
          provider: provider,
          options: {
              redirectTo: window.location.origin + '/chat/'
          }
      });
  }

  async function logout() {
      await supabaseClient.auth.signOut();
  }

  // 5. Fetch and Display Messages
  async function loadMessages() {
      const { data, error } = await supabaseClient
          .from('letstrygg_chat')
          .select('*')
          .order('created_at', { ascending: true });
      
      if (error) {
          console.error("Error loading messages:", error);
          chatBox.innerHTML = '<span style="color: #e74c3c;">Failed to load messages.</span>';
          return;
      }

      chatBox.innerHTML = ''; 
      
      if (data.length === 0) {
          chatBox.innerHTML = '<em>No messages yet.</em>';
          return;
      }

      data.forEach(row => {
          const msgElement = document.createElement('div');
          msgElement.style.marginBottom = '8px';
          msgElement.style.lineHeight = '1.4';
          
          const displayName = row.username || 'Anon';
          msgElement.innerHTML = `<strong style="color: #e67e22;">${displayName}:</strong> ${row.message}`;
          chatBox.appendChild(msgElement);
      });
      
      chatBox.scrollTop = chatBox.scrollHeight;
  }

  // 6. Handle Sending Messages
  sendBtn.addEventListener('click', async () => {
      const text = chatInput.value.trim();
      if (!text || !currentSession) return;

      sendBtn.disabled = true;
      statusMessage.textContent = "Sending...";
      statusMessage.style.color = "#ccc";

      const meta = currentSession.user.user_metadata;
      const name = meta.preferred_username || meta.full_name || meta.name || 'User';

      const { error } = await supabaseClient
          .from('letstrygg_chat')
          .insert([{ 
              message: text,
              user_id: currentSession.user.id,
              username: name
          }]);

      if (error) {
          console.error("Supabase Error:", error);
          statusMessage.textContent = "Error: " + error.message;
          statusMessage.style.color = "#e74c3c";
      } else {
          statusMessage.textContent = "Sent!";
          statusMessage.style.color = "#2ecc71";
          chatInput.value = ""; 
          await loadMessages();
          setTimeout(() => statusMessage.textContent = "", 2000);
      }

      sendBtn.disabled = false;
  });

  chatInput.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') sendBtn.click();
  });

  // 7. Initial load
  loadMessages();
</script>
