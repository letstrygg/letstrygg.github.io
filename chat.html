<div class="game-page-wrapper">
  <div class="manual-content">
      <h1 class="title">Chat Test</h1>
      
      <div style="margin-bottom: 20px;">
          <input type="text" id="chatInput" placeholder="Type a message..." style="padding: 10px; width: 300px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;">
          <button id="sendBtn" class="btn btn-gray" style="padding: 10px 15px;">Send Hello World</button>
      </div>

      <p id="statusMessage" style="color: #2ecc71;"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // Initialize Supabase
  const supabaseUrl = 'https://fnwmtytnltmqjaflfwyr.supabase.co';
  const supabaseKey = 'sb_publishable_y12qZF_dSbUPmV_aieiUgA_CibDsxQV';
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  const sendBtn = document.getElementById('sendBtn');
  const chatInput = document.getElementById('chatInput');
  const statusMessage = document.getElementById('statusMessage');

  sendBtn.addEventListener('click', async () => {
      const text = chatInput.value.trim();
      if (!text) return;

      sendBtn.disabled = true;
      statusMessage.textContent = "Sending...";

      // Insert the message into the database
      const { data, error } = await supabase
          .from('letstrygg_chat')
          .insert([
              { message: text }
          ]);

      if (error) {
          console.error("Supabase Error:", error);
          statusMessage.textContent = "Error: " + error.message;
          statusMessage.style.color = "#e74c3c"; // Red
      } else {
          statusMessage.textContent = "Message sent successfully!";
          statusMessage.style.color = "#2ecc71"; // Green
          chatInput.value = ""; // Clear the input
      }

      sendBtn.disabled = false;
  });
</script>
