---
layout: new
title: LTG YouTube Gameplay
custom_css: "/css/home.css"
---

<div class="sort-controls">
	<input type="text" id="gameSearch" placeholder="Search games (e.g. slay the spire)...">
	<button class="btn active" id="btn-recent" onclick="sortGrid('recent')">
	  <span class="material-symbols-outlined icon-green">psychiatry</span> Newest
	</button>
	<button class="btn" id="btn-popular" onclick="sortGrid('popular')">
	  <span class="material-symbols-outlined icon-blue">visibility</span> Most Views
	</button>
	<button class="btn" id="btn-length" onclick="sortGrid('length')">
	  <span class="material-symbols-outlined icon-purple">schedule</span> Longest
	</button>
	<button class="btn orange-btn" id="btn-vpv" onclick="sortGrid('vpv')">
	  <span class="material-symbols-outlined icon-orange">mode_heat</span> Views/Video
	</button>
</div>

<div class="game-grid" id="all-series-grid">
  {% for p in site.data.games %}
    <a href="/game/{{ p.id }}/" class="filterable-card" data-title="{{ p.title | downcase }}">
      <div class="game-card" data-updated="{{ p.updated | date: '%Y%m%d' }}" data-episodes="{{ p.episodes }}" data-views="{{ p.views }}" data-duration="{{ p.duration }}" data-vpv="{{ p.vpv }}">
        <img src="{{ p.thumbnail }}" alt="{{ p.title }}">
        <div class="card-row">
			<strong>{{ p.title }}</strong>
			<span class="card-status {{ p.status_color }}">{{ p.status }}</span>
        </div>
        <div class="card-row">
			<span><span class="material-symbols-outlined gray">play_circle</span> {{ p.episodes }}</span>
			<span><span class="material-symbols-outlined gray">visibility</span> {{ p.views_formatted }}</span>
			<span><span class="material-symbols-outlined gray">schedule</span> {{ p.duration_formatted }}</span>
        </div>
        <div class="card-row vpv-row" style="display: none; color: #aaa; margin-top: 5px; border-top: 1px solid #333;">
			<span><span class="material-symbols-outlined orange">mode_heat</span> {{ p.vpv_formatted }} views per video</span>
        </div>
      </div>
    </a>
  {% endfor %}
</div>

<script>
function sortGrid(type) {
  document.querySelectorAll('.sort-controls .btn').forEach(btn => btn.classList.remove('active'));
  const clickedBtn = document.getElementById(`btn-${type}`);
  if (clickedBtn) clickedBtn.classList.add('active');

  const grid = document.getElementById('all-series-grid');
  const cards = Array.from(grid.querySelectorAll('.filterable-card'));

  cards.sort((a, b) => {
    const cardA = a.querySelector('.game-card');
    const cardB = b.querySelector('.game-card');
    
    if (!cardA || !cardB) return 0;

    if (type === 'recent') return parseInt(cardB.dataset.updated || 0) - parseInt(cardA.dataset.updated || 0);
    if (type === 'popular') return parseInt(cardB.dataset.views || 0) - parseInt(cardA.dataset.views || 0);
    if (type === 'length') return parseInt(cardB.dataset.duration || 0) - parseInt(cardA.dataset.duration || 0);
    if (type === 'vpv') return parseInt(cardB.dataset.vpv || 0) - parseInt(cardA.dataset.vpv || 0); // NEW: VPV Sort
  });

  grid.innerHTML = '';
  cards.forEach(card => {
    // NEW: Toggle the VPV row visibility
    const vpvRow = card.querySelector('.vpv-row');
    if (vpvRow) {
      vpvRow.style.display = (type === 'vpv') ? 'flex' : 'none';
    }
    grid.appendChild(card);
  });
}

document.getElementById('gameSearch').addEventListener('input', function(e) {
  const searchTerm = e.target.value.toLowerCase();
  const grid = document.getElementById('all-series-grid');
  const cards = grid.querySelectorAll('.filterable-card');

  cards.forEach(card => {
    const title = card.getAttribute('data-title');
    if (title.includes(searchTerm)) {
      card.style.display = ''; 
    } else {
      card.style.display = 'none';
    }
  });
});

document.addEventListener('DOMContentLoaded', () => sortGrid('recent'));
</script>
