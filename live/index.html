---
layout: watch
title: Live Streams
permalink: /live/
---

{% include watch_player.html %}

<div id="platform-toggles" style="padding-bottom: 20px; display: none; justify-content: center; gap: 15px; margin-top: -10px;">
    <button id="btn-twitch" class="btn" onclick="switchPlatform('twitch')" style="display: flex; align-items: center; gap: 6px;">
        <span class="material-symbols-outlined" style="font-size: 18px;">sensors</span> Twitch
    </button>
    <button id="btn-youtube" class="btn" onclick="switchPlatform('youtube')" style="display: flex; align-items: center; gap: 6px;">
        <span class="material-symbols-outlined" style="font-size: 18px;">play_circle</span> YouTube
    </button>
    <button id="btn-kick" class="btn" onclick="switchPlatform('kick')" style="display: flex; align-items: center; gap: 6px;">
        <span class="material-symbols-outlined" style="font-size: 18px;">bolt</span> Kick
    </button>
</div>

<script>
let currentPlatform = 'twitch';
let activeStreamer = ''; 
let streamerData = null;

// 1. Direct fetch to Supabase (Searches slugs OR raw platform IDs)
async function fetchStreamerData(slug) {
    const supabaseUrl = '{{ site.supabase_url }}';
    const supabaseKey = '{{ site.supabase_anon_key }}';
    
    if (!supabaseUrl || !supabaseKey) return null;
    try {
        const response = await fetch(`${supabaseUrl}/rest/v1/ltg_channels?or=(slug.eq.${slug},youtube_channel_id.eq.${slug},twitch_channel.eq.${slug})&select=*`, {
            headers: { 'apikey': supabaseKey, 'Authorization': `Bearer ${supabaseKey}` }
        });
        const data = await response.json();
        return data.length > 0 ? data[0] : null;
    } catch (e) { return null; }
}

// 2. Main initialization
async function loadStreamFromHash() {
    const hash = window.location.hash.substring(1); 
    if (!hash) return;

    const parts = hash.split('/');
    if (parts.length >= 2) {
        currentPlatform = parts[0].toLowerCase();
        activeStreamer = parts[1];
        
        streamerData = await fetchStreamerData(activeStreamer);
        
        // URL Normalizer: Swaps ugly IDs for beautiful slugs
        if (streamerData && activeStreamer !== streamerData.slug) {
            activeStreamer = streamerData.slug;
            history.replaceState(null, '', `#${currentPlatform}/${activeStreamer}`);
        }
        
        const togglesContainer = document.getElementById('platform-toggles');
        const btnTwitch = document.getElementById('btn-twitch');
        const btnYoutube = document.getElementById('btn-youtube');
        const btnKick = document.getElementById('btn-kick');

        let platformCount = 0;
        if (streamerData) {
            if (streamerData.twitch_channel) platformCount++;
            if (streamerData.youtube_channel_id) platformCount++;
            if (streamerData.kick_channel) platformCount++;
        }

        // Show platform toggles if they stream on multiple sites
        if (platformCount >= 2) {
            if (togglesContainer) togglesContainer.style.display = 'flex';
            if (btnTwitch) btnTwitch.style.display = streamerData.twitch_channel ? 'flex' : 'none';
            if (btnYoutube) btnYoutube.style.display = streamerData.youtube_channel_id ? 'flex' : 'none';
            if (btnKick) btnKick.style.display = streamerData.kick_channel ? 'flex' : 'none';
        } else {
            if (togglesContainer) togglesContainer.style.display = 'none';
        }

        renderStream();
    }
}

// 3. THE MISSING FUNCTION: Handles the button clicks!
function switchPlatform(platform) {
    if (!activeStreamer) return;
    // Changing the hash triggers the event listener, which re-runs loadStreamFromHash automatically
    window.location.hash = `${platform}/${activeStreamer}`;
}

// 4. Renders the UI states and calls the external video player
function renderStream() {
    const btns = {
        twitch: { el: document.getElementById('btn-twitch'), color: 'var(--purple)', idKey: 'twitch_channel' },
        youtube: { el: document.getElementById('btn-youtube'), color: 'var(--red)', idKey: 'youtube_channel_id' },
        kick: { el: document.getElementById('btn-kick'), color: 'var(--green)', idKey: 'kick_channel' }
    };

    const liveData = streamerData ? streamerData.live_data : null;
    const livePlatforms = (liveData && liveData.is_live && Array.isArray(liveData.platforms)) ? liveData.platforms : [];

    let targetId = activeStreamer;

    Object.keys(btns).forEach(platform => {
        const btnObj = btns[platform];
        const btn = btnObj.el;
        if (!btn) return;

        const icon = btn.querySelector('.material-symbols-outlined');
        const isLive = livePlatforms.includes(platform);
        
        if (currentPlatform === platform) {
            // Active platform styling
            btn.style.color = btnObj.color;
            btn.style.borderColor = btnObj.color;
            if (icon) icon.style.color = btnObj.color;
            
            targetId = (streamerData && streamerData[btnObj.idKey]) ? streamerData[btnObj.idKey] : activeStreamer;
        } else {
            // Inactive platform styling (plus live-indicator check)
            btn.style.color = 'var(--text)';
            btn.style.borderColor = 'var(--border)';
            if (icon) icon.style.color = isLive ? btnObj.color : 'inherit';
        }
    });

    // Notify the chat that the topic changed
    window.dispatchEvent(new CustomEvent('topicChanged', { detail: activeStreamer }));
    
    // Call the universal player API exposed in watch_player.js
    if (typeof window.startDynamicLivePlayer === 'function') {
        window.startDynamicLivePlayer(currentPlatform, targetId);
    }
}

// Event Listeners
window.addEventListener('load', loadStreamFromHash);
window.addEventListener('hashchange', loadStreamFromHash);
</script>
